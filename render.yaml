services:
  - type: web
    name: pulmoai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: pulmoai
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
